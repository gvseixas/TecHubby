<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — TecHubby</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/EstiloGeral.css">
    <link rel="stylesheet" href="../css/EstiloConta.css">
    <link rel="shortcut icon" href="../imagens/favicon.svg" type="image/x-icon">
</head>
<body>
    <header class="nav_bar">
        <nav class="logo">
            <a href="../index.html">
                <img src="../imagens/logo.svg" alt="Logo do TecHub">
            </a>
        </nav>

        <nav class="barra_pesquisa">
            <i class='bx bx-search'></i>
            <input type="text" placeholder="Buscar produtos, componentes...">
        </nav>

        <nav>
            <ul class="menu_lateral">
                <li class="menu_item">
                    <a href="" class="nav_icon" aria-label="Carrinho">
                        <i class='bx bx-cart'></i>
                        <span class="cart_badge">0</span>
                    </a>
                </li>
                <li class="menu_item">
                    <a href="paginas/conta.html" class="btn">
                        <i class='bx bxs-user'></i>
                        <span>Conta</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container_geral">
        <form class="container_body" action="../php/cadastro.php" method="post">
            <div class="container">
                <h1>Cadastro</h1>

                <div class="input_box">
                    <input type="text" name="nome" placeholder="Nome" required>
                    <i class="bx bxs-user"></i>
                </div>


                <div class="input_box">
                    <input type="email" name="email" placeholder="Usuário" required>
                    <i class="bx bxs-user"></i>
                </div>

                <div class="input_box">
                    <input type="password" name="senha" placeholder="Senha" required>
                    <i class="bx bxs-lock-alt"></i>
                </div>

                <div class="input_box">
                    <input type="password" name="senha_confirmar" placeholder="Confirmar senha" required>
                    <i class="bx bxs-lock-alt"></i>
                </div>

                <button type="submit" class="btn botao_login">Cadastre-se</button>

                <button type="button" class="btn botao_google" aria-label="Entrar com Google">
                    <i class='bx bxl-google'></i>
                    Entrar com Google
                </button>

                <div class="link_registrar">
                    <p>Já tem uma conta? <a href="conta.html">Faça login</a></p>
                </div>
            </div>
        </form>
    </main>

    <style>
        .botao_google{
            width: 100%;
            height: 50px;
            margin-top: 14px;
            background-color: transparent;
            border: 2px solid rgba(255,255,255, .2);
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .botao_google i{
            font-size: 20px;
            color: #00d4f5;
        }

        .botao_google:hover{
            border-color: rgba(0, 212, 245, 0.6);
            box-shadow: 0 0 24px rgba(0, 212, 245, 0.25);
            transition: 0.5s;
        }
    </style>
</body>
</html>

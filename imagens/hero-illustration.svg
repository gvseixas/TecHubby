<svg viewBox="0 0 340 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

  <defs>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4f5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Notebook base -->
  <rect x="60" y="40" width="220" height="145" rx="10" fill="#0f1e30" stroke="#1e3a55" stroke-width="1.5"/>
  <!-- Tela -->
  <rect x="72" y="52" width="196" height="118" rx="6" fill="#0a1520"/>
  <!-- Brilho da tela -->
  <rect x="72" y="52" width="196" height="118" rx="6" fill="url(#screenGlow)" opacity="0.4"/>

  <!-- Conteúdo na tela: barras de código fake -->
  <rect x="90" y="72"  width="80"  height="5" rx="2" fill="#00d4f5" opacity="0.6"/>
  <rect x="90" y="84"  width="120" height="5" rx="2" fill="#1e3a55" opacity="0.9"/>
  <rect x="90" y="96"  width="100" height="5" rx="2" fill="#1e3a55" opacity="0.9"/>
  <rect x="90" y="108" width="60"  height="5" rx="2" fill="#00d4f5" opacity="0.3"/>
  <rect x="90" y="120" width="140" height="5" rx="2" fill="#1e3a55" opacity="0.9"/>
  <rect x="90" y="132" width="90"  height="5" rx="2" fill="#1e3a55" opacity="0.9"/>
  <rect x="90" y="144" width="110" height="5" rx="2" fill="#00d4f5" opacity="0.2"/>

  <!-- Base do notebook -->
  <rect x="50" y="185" width="240" height="12" rx="4" fill="#0f1e30" stroke="#1e3a55" stroke-width="1"/>
  <!-- Touchpad -->
  <rect x="145" y="189" width="50" height="6" rx="2" fill="#1e3a55"/>

  <!-- Raio decorativo -->
  <polygon points="180,10 162,95 175,95 155,175 198,80 183,80 202,10" fill="#f5c842" opacity="0.85"/>

  <!-- Hexágono flutuante pequeno -->
  <polygon points="296,55 308,62 308,76 296,83 284,76 284,62" fill="none" stroke="#00d4f5" stroke-width="1.5" opacity="0.7"/>
  <line x1="290" y1="65" x2="302" y2="65" stroke="#00d4f5" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="296" y1="65" x2="296" y2="75" stroke="#00d4f5" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Pontos decorativos de circuito esquerda -->
  <circle cx="52" cy="100" r="3" fill="#00d4f5" opacity="0.4"/>
  <circle cx="52" cy="115" r="3" fill="#00d4f5" opacity="0.25"/>
  <circle cx="52" cy="130" r="3" fill="#00d4f5" opacity="0.15"/>
  <line x1="52" y1="100" x2="52" y2="130" stroke="#00d4f5" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.3"/>

  <!-- Pontos decorativos de circuito direita -->
  <circle cx="288" cy="155" r="3" fill="#00d4f5" opacity="0.4"/>
  <circle cx="302" cy="165" r="3" fill="#00d4f5" opacity="0.25"/>
  <line x1="288" y1="155" x2="302" y2="165" stroke="#00d4f5" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.3"/>

</svg>

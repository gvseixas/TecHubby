<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- Hexágono -->
  <polygon points="50,18 74,31 74,57 50,70 26,57 26,31" fill="none" stroke="#00d4f5" stroke-width="2.5"/>
  <polygon points="50,26 67,36 67,56 50,64 33,56 33,36" fill="#00d4f5" fill-opacity="0.08"/>
  <!-- "T" dentro do hex -->
  <line x1="40" y1="38" x2="60" y2="38" stroke="#00d4f5" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="38" x2="50" y2="58" stroke="#00d4f5" stroke-width="3" stroke-linecap="round"/>
  <!-- Linhas circuito saindo do hex -->
  <line x1="26" y1="44" x2="10" y2="44" stroke="#00d4f5" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <circle cx="8" cy="44" r="2.5" fill="#00d4f5" opacity="0.6"/>
  <line x1="74" y1="44" x2="90" y2="44" stroke="#00d4f5" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <circle cx="92" cy="44" r="2.5" fill="#00d4f5" opacity="0.6"/>
  <!-- Nome -->
  <text x="106" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Tec<tspan fill="#00d4f5">Hubby</tspan></text>
  <!-- Tagline -->
  <text x="106" y="74" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666666" letter-spacing="2.5">HARDWARE MARKETPLACE</text>
